<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="서울창업허브 글로벌 진출 프로그램 관리 대시보드">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="김비서">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="manifest" href="/manifest.json">
<title>김비서 대시보드</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; padding: 20px; }
  .container { max-width: 1200px; margin: 0 auto; }
  h1 { text-align: center; margin-bottom: 30px; color: #333; }

  .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }

  .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .card-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; color: #333; }

  /* 할 일 목록 */
  .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px; margin-bottom: 8px; background: #f9f9f9; border-radius: 8px; border-left: 4px solid #4CAF50; }
  .todo-item.high { border-left-color: #FF6B6B; }
  .todo-item.mid { border-left-color: #FFC107; }
  .todo-item.low { border-left-color: #4CAF50; }
  .todo-cb { width: 18px; height: 18px; cursor: pointer; }
  .todo-text { flex: 1; font-size: 14px; }

  /* 일정 */
  .schedule-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .schedule-table th { background: #f0f0f0; padding: 10px; text-align: left; }
  .schedule-table td { padding: 8px; border-bottom: 1px solid #eee; }
  .schedule-table tr:hover { background: #f9f9f9; }

  /* 프로젝트 진행률 */
  .project-item { margin-bottom: 15px; }
  .project-name { font-size: 13px; font-weight: 600; margin-bottom: 5px; }
  .progress-bar { width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); border-radius: 4px; }

  /* 매출 카드 */
  .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 15px; border-radius: 8px; text-align: center; }
  .stat-card.green { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
  .stat-value { font-size: 24px; font-weight: 700; margin-bottom: 5px; }
  .stat-label { font-size: 12px; opacity: 0.9; }

  .full-width { grid-column: 1 / -1; }
</style>
</head>
<body>

<div class="container">
  <h1>📊 김비서 대시보드</h1>

  <div class="dashboard">
    <!-- 1. 할 일 목록 -->
    <div class="card">
      <div class="card-title">✅ 할 일 목록</div>
      <div class="todo-item high">
        <input type="checkbox" class="todo-cb">
        <span class="todo-text">1차 모집 마감 D-6 긴급</span>
      </div>
      <div class="todo-item high">
        <input type="checkbox" class="todo-cb">
        <span class="todo-text">파트너사 협의 미팅</span>
      </div>
      <div class="todo-item mid">
        <input type="checkbox" class="todo-cb">
        <span class="todo-text">기업평가 심사위원 확정</span>
      </div>
      <div class="todo-item mid">
        <input type="checkbox" class="todo-cb">
        <span class="todo-text">SNS 홍보 콘텐츠 작성</span>
      </div>
      <div class="todo-item low">
        <input type="checkbox" class="todo-cb">
        <span class="todo-text">2차 모집 기획 착수</span>
      </div>
    </div>

    <!-- 2. 이번 주 일정 -->
    <div class="card">
      <div class="card-title">📅 이번 주 일정</div>
      <table class="schedule-table">
        <tr><th>요일</th><th>일정</th></tr>
        <tr><td>월</td><td>1차 모집 진행</td></tr>
        <tr><td>화</td><td>파트너사 미팅</td></tr>
        <tr><td>수</td><td>접수 현황 점검</td></tr>
        <tr><td>목</td><td>심사위원 협의</td></tr>
        <tr><td>금</td><td>주간 회의</td></tr>
      </table>
    </div>

    <!-- 3. 프로젝트 진행률 -->
    <div class="card">
      <div class="card-title">📈 프로젝트 진행률</div>
      <div class="project-item">
        <div class="project-name">독일·스위스 PoC (25%)</div>
        <div class="progress-bar"><div class="progress-fill" style="width: 25%;"></div></div>
      </div>
      <div class="project-item">
        <div class="project-name">인도 PoC (20%)</div>
        <div class="progress-bar"><div class="progress-fill" style="width: 20%;"></div></div>
      </div>
      <div class="project-item">
        <div class="project-name">UAE 스케일업 (30%)</div>
        <div class="progress-bar"><div class="progress-fill" style="width: 30%;"></div></div>
      </div>
      <div class="project-item">
        <div class="project-name">프랑스 액셀러레이팅 (28%)</div>
        <div class="progress-bar"><div class="progress-fill" style="width: 28%;"></div></div>
      </div>
    </div>

    <!-- 4. 매출 요약 -->
    <div class="card">
      <div class="card-title">💰 매출 요약</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-value">2.32억</div>
          <div class="stat-label">총 지원금</div>
        </div>
        <div class="stat-card green">
          <div class="stat-value">58개</div>
          <div class="stat-label">모집 목표</div>
        </div>
        <div class="stat-card">
          <div class="stat-value">8개</div>
          <div class="stat-label">협약 완료</div>
        </div>
        <div class="stat-card green">
          <div class="stat-value">10개</div>
          <div class="stat-label">프로그램</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// 할 일 체크박스
document.querySelectorAll('.todo-cb').forEach(cb => {
  cb.addEventListener('change', function() {
    this.parentElement.style.opacity = this.checked ? '0.5' : '1';
  });
});

// Service Worker 등록 (PWA)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').then(reg => {
    console.log('✅ Service Worker 등록 완료');
  }).catch(err => {
    console.log('Service Worker 등록 실패:', err);
  });
}
</script>

</body>
</html>
