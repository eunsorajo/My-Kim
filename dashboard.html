<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a1a2e">
<meta name="description" content="2026 글로벌 진출 업무 대시보드">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="2026 글로벌">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="manifest" href="/manifest.json">
<title>2026 글로벌 진출 업무 대시보드</title>
<style>
  :root {
    --bg: #0F0F1A;
    --surface: #16162A;
    --surface2: #1E1E35;
    --border: #2A2A45;
    --text: #E8E8F0;
    --text-muted: #7070A0;
    --accent: #7C6EFF;
    --accent2: #FF6B9D;
    --green: #00D68F;
    --orange: #FFB547;
    --red: #FF5C6C;
    --cyan: #00C9E0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-bottom: 60px;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #1A1A35 0%, #0F0F1A 100%);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-content { display: flex; justify-content: space-between; align-items: center; }
  .logo { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin-left: 10px; }
  .header-time { font-size: 11px; color: var(--text-muted); }

  /* ── Main Content ── */
  .content { flex: 1; overflow-y: auto; padding: 12px; }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ── Cards ── */
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
  .card-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

  /* ── Tab Navigation (Bottom) ── */
  .tab-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    z-index: 200;
    height: 60px;
  }

  .tab-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    border: none;
    background: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    padding: 6px;
    transition: all 0.3s;
  }

  .tab-btn.active {
    color: var(--accent);
    background: rgba(124, 110, 255, 0.1);
  }

  .tab-btn span:first-child { font-size: 20px; }

  /* ── KPI Cards ── */
  .kpi-mini {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .kpi-mini-label { font-size: 12px; color: var(--text-muted); }
  .kpi-mini-value { font-size: 18px; font-weight: 800; }

  .kpi-mini.purple .kpi-mini-value { color: #B8B0FF; }
  .kpi-mini.pink .kpi-mini-value { color: #FFB0CC; }
  .kpi-mini.green .kpi-mini-value { color: var(--green); }
  .kpi-mini.orange .kpi-mini-value { color: var(--orange); }

  /* ── Todo Items ── */
  .todo-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 11px;
    margin-bottom: 8px;
    cursor: pointer;
    min-height: 42px;
  }

  .todo-item.done { opacity: 0.5; }
  .todo-item.done .todo-text { text-decoration: line-through; }

  .todo-cb {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
  }

  .todo-item.done .todo-cb {
    background: var(--green);
    border-color: var(--green);
  }

  .todo-check { display: none; color: white; font-size: 12px; font-weight: 700; }
  .todo-item.done .todo-check { display: block; }

  .todo-priority {
    width: 3px;
    height: 30px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .todo-priority.urgent { background: var(--red); }
  .todo-priority.high { background: var(--orange); }
  .todo-priority.mid { background: var(--accent); }
  .todo-priority.low { background: var(--green); }

  .todo-text { flex: 1; font-size: 13px; }

  /* ── Schedule ── */
  .day-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
  }

  .day-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .day-name { font-size: 12px; font-weight: 700; color: var(--text); }
  .day-task { font-size: 12px; color: var(--text-muted); }

  /* ── Projects ── */
  .project-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px;
    margin-bottom: 8px;
  }

  .project-name { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .project-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }
  .project-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .project-fill { height: 100%; border-radius: 3px; }

  /* ── Stats ── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-box {
    background: linear-gradient(135deg, var(--accent) 0%, #5D4FCC 100%);
    border-radius: 8px;
    padding: 12px;
    text-align: center;
    color: white;
  }

  .stat-box.pink { background: linear-gradient(135deg, var(--accent2) 0%, #D4567E 100%); }
  .stat-box.green { background: linear-gradient(135deg, var(--green) 0%, #00B377 100%); }
  .stat-box.orange { background: linear-gradient(135deg, var(--orange) 0%, #E67C2F 100%); }

  .stat-value { font-size: 20px; font-weight: 800; line-height: 1.2; }
  .stat-label { font-size: 10px; color: rgba(255,255,255,0.8); margin-top: 2px; }

  /* ── Scrollbar ── */
  .content::-webkit-scrollbar { width: 4px; }
  .content::-webkit-scrollbar-track { background: transparent; }
  .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-content">
    <div style="display:flex;align-items:center;">
      <div class="logo">🌏</div>
      <div style="margin-left:10px;">
        <div class="header-title">2026 글로벌</div>
        <div style="font-size:10px;color:var(--text-muted);margin-top:1px;">업무 대시보드</div>
      </div>
    </div>
    <div class="header-time" id="clock">2026.04.01</div>
  </div>
</header>

<!-- Content -->
<div class="content">
  <!-- Tab 1: 할 일 -->
  <div class="tab-content active" id="tab-todo">
    <div class="card">
      <div class="card-title">📋 오늘의 할 일</div>
      <div id="todoList"></div>
    </div>
  </div>

  <!-- Tab 2: 일정 -->
  <div class="tab-content" id="tab-schedule">
    <div class="card">
      <div class="card-title">📅 이번 주 일정</div>
      <div id="scheduleList"></div>
    </div>
  </div>

  <!-- Tab 3: 프로젝트 -->
  <div class="tab-content" id="tab-projects">
    <div class="card">
      <div class="card-title">📈 프로젝트 진행률</div>
      <div id="projectList"></div>
    </div>
  </div>

  <!-- Tab 4: 요약 -->
  <div class="tab-content" id="tab-summary">
    <div class="card">
      <div class="card-title">💰 매출 요약</div>
      <div class="stat-grid">
        <div class="stat-box">
          <div class="stat-value">2.32억</div>
          <div class="stat-label">총 지원금</div>
        </div>
        <div class="stat-box pink">
          <div class="stat-value">58개</div>
          <div class="stat-label">모집 목표</div>
        </div>
        <div class="stat-box green">
          <div class="stat-value">8개</div>
          <div class="stat-label">협약 완료</div>
        </div>
        <div class="stat-box orange">
          <div class="stat-value">10개</div>
          <div class="stat-label">프로그램</div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Bottom Tab Navigation -->
<div class="tab-nav">
  <button class="tab-btn active" onclick="showTab('todo')">
    <span>✅</span>
    <span>할 일</span>
  </button>
  <button class="tab-btn" onclick="showTab('schedule')">
    <span>📅</span>
    <span>일정</span>
  </button>
  <button class="tab-btn" onclick="showTab('projects')">
    <span>📈</span>
    <span>프로젝트</span>
  </button>
  <button class="tab-btn" onclick="showTab('summary')">
    <span>💰</span>
    <span>요약</span>
  </button>
</div>

<script>
// ── 시계 ──
function updateClock() {
  const now = new Date();
  const year = 2026;
  const month = 4;
  const day = 1;
  const timeStr = now.toTimeString().slice(0,5);
  document.getElementById('clock').textContent = `2026.4.1 ${timeStr}`;
}
setInterval(updateClock, 1000);
updateClock();

// ── 할 일 데이터 ──
const todos = [
  { text: '1차 모집 접수 현황 확인', priority: 'urgent', done: false },
  { text: '사전타당성 검토표 미제출자 연락', priority: 'urgent', done: false },
  { text: '기업평가 심사위원 확정', priority: 'high', done: false },
  { text: '파트너사 협의 미팅', priority: 'high', done: false },
  { text: 'SNS 홍보 콘텐츠 작성', priority: 'mid', done: false },
];

// ── 일정 데이터 ──
const schedule = [
  { day: '월(4/1)', task: '1차 모집 진행중' },
  { day: '화(4/2)', task: '파트너사 미팅' },
  { day: '수(4/3)', task: '접수 현황 점검' },
  { day: '목(4/4)', task: '심사위원 협의' },
  { day: '금(4/5)', task: '주간 회의' },
];

// ── 프로젝트 데이터 ──
const projects = [
  { name: '독일·스위스 PoC', pct: 20, color: '#7C6EFF' },
  { name: '인도 PoC', pct: 20, color: '#00C9E0' },
  { name: 'UAE 스케일업', pct: 25, color: '#FFB547' },
  { name: '프랑스 액셀러레이팅', pct: 28, color: '#B8B0FF' },
];

// ── 렌더링 ──
function renderTodos() {
  const list = document.getElementById('todoList');
  list.innerHTML = todos.map((t, i) => `
    <div class="todo-item ${t.done ? 'done' : ''}" onclick="toggleTodo(${i})">
      <div class="todo-priority ${t.priority}"></div>
      <div class="todo-cb">
        <span class="todo-check">✓</span>
      </div>
      <div class="todo-text">${t.text}</div>
    </div>
  `).join('');
}

function renderSchedule() {
  const list = document.getElementById('scheduleList');
  list.innerHTML = schedule.map(s => `
    <div class="day-item">
      <div class="day-header">
        <div class="day-name">${s.day}</div>
        <div class="day-task">${s.task}</div>
      </div>
    </div>
  `).join('');
}

function renderProjects() {
  const list = document.getElementById('projectList');
  list.innerHTML = projects.map(p => `
    <div class="project-item">
      <div class="project-meta">
        <div class="project-name">${p.name}</div>
        <div style="color:${p.color};font-weight:700;">${p.pct}%</div>
      </div>
      <div class="project-bar">
        <div class="project-fill" style="width:${p.pct}%;background:${p.color};"></div>
      </div>
    </div>
  `).join('');
}

// ── 탭 전환 ──
function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));

  document.getElementById(`tab-${tab}`).classList.add('active');
  event.target.closest('.tab-btn').classList.add('active');
}

// ── 할 일 토글 ──
function toggleTodo(index) {
  todos[index].done = !todos[index].done;
  renderTodos();
}

// ── 초기 렌더링 ──
renderTodos();
renderSchedule();
renderProjects();

// ── Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/service-worker.js').catch(err => {
    console.log('Service Worker 등록 실패:', err);
  });
}
</script>

</body>
</html>
