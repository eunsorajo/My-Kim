<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="512" height="512" fill="url(#grad)"/>

  <!-- 원형 배경 -->
  <circle cx="256" cy="256" r="200" fill="#ffffff" opacity="0.1"/>

  <!-- 📊 차트 아이콘 -->
  <g transform="translate(256, 256)">
    <!-- 수직선 (축) -->
    <line x1="-60" y1="60" x2="-60" y2="-80" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
    <line x1="-60" y1="60" x2="80" y2="60" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>

    <!-- 막대 1 -->
    <rect x="-40" y="-30" width="30" height="90" fill="#4CAF50" rx="4"/>
    <!-- 막대 2 -->
    <rect x="-5" y="-50" width="30" height="110" fill="#8BC34A" rx="4"/>
    <!-- 막대 3 -->
    <rect x="30" y="-70" width="30" height="130" fill="#FFC107" rx="4"/>

    <!-- 김비서 텍스트 -->
    <text x="0" y="100" font-size="36" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="Arial">김</text>
  </g>
</svg>
